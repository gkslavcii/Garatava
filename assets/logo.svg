<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" role="img" aria-label="GARATAVA Bodrum">
  <defs>
    <style>
      .wm    { font-family: 'Playfair Display', 'Times New Roman', serif; font-style: italic; fill: currentColor; }
      .tag   { font-family: 'Inter', 'Arial', sans-serif; fill: currentColor; letter-spacing: 16px; opacity: 0.75; }
      .ln    { stroke: currentColor; stroke-width: 1; fill: none; opacity: 0.35; }
    </style>
  </defs>

  <!-- Üst ince çizgi -->
  <line class="ln" x1="60"  y1="38" x2="420" y2="38"/>

  <!-- WORDMARK -->
  <text class="wm" x="240" y="98" text-anchor="middle" font-size="74" font-weight="500" letter-spacing="10">GARATAVA</text>

  <!-- Alt ince çizgi -->
  <line class="ln" x1="60"  y1="118" x2="420" y2="118"/>

  <!-- TAGLINE -->
  <text class="tag" x="240" y="142" text-anchor="middle" font-size="12" font-weight="500">BODRUM</text>
</svg>
